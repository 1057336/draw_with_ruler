<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Canvas Paint with Ruler Layer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 툴바 스타일 */
        #toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background-color: #ffffff;
            padding: 12px 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 1px solid #e0e0e0;
            padding-right: 12px;
        }

        .control-group:last-child {
            border-right: none;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4a4a4a;
        }

        button {
            background-color: #ececec;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        button.active {
            background-color: #007aff;
            color: white;
        }

        button#btn-remove {
            background-color: #ff3b30;
            color: white;
        }

        button#btn-remove:hover {
            background-color: #d62f26;
        }

        input[type="range"] {
            width: 70px;
            cursor: pointer;
        }

        input[type="color"] {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="text"] {
            width: 70px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
        }

        .file-label {
            background-color: #34c759;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        #file-load {
            display: none;
        }

        /* 룰러 세팅 안내 모달/바 스타일 */
        #ruler-status {
            font-size: 12px;
            font-weight: bold;
            color: #ff3b30;
            margin-left: 5px;
        }

        /* 캔버스 영역 - 두 개의 캔버스를 겹치기 위해 relative 설정 */
        #canvas-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #e5e5e7;
            position: relative;
        }

        /* 두 캔버스를 완벽히 겹치게 만드는 포지셔닝 */
        .canvas-wrapper {
            position: relative;
            width: 900px;
            height: 600px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #paint-canvas {
            background-color: #ffffff;
            z-index: 1;
        }

        #ruler-canvas {
            background-color: transparent;
            z-index: 2;
            cursor: crosshair;
            pointer-events: none;
            /* 마우스 이벤트가 하단 그림판으로 통과하도록 설정 */
        }
    </style>
</head>

<body>

    <div id="toolbar">
        <div class="control-group">
            <button id="btn-pen" class="active">Pen</button>
            <label for="slider-pen">Size</label>
            <input type="range" id="slider-pen" min="1" max="50" value="5">
        </div>

        <div class="control-group">
            <button id="btn-eraser">Eraser</button>
            <label for="slider-eraser">Size</label>
            <input type="range" id="slider-eraser" min="1" max="100" value="20">
        </div>

        <div class="control-group">
            <label>Color</label>
            <input type="color" id="color-picker" value="#000000">
            <input type="text" id="color-hex" value="#000000" maxlength="7">
        </div>

        <div class="control-group">
            <button id="btn-save" style="background-color: #007aff; color: white;">Save (PNG)</button>
            <label for="file-load" class="file-label">Load Image</label>
            <input type="file" id="file-load" accept="image/*">
        </div>

        <div class="control-group" style="background-color: #f2f2f7; padding: 6px 10px; border-radius: 8px;">
            <button id="btn-ruler">Ruler</button>
            <button id="btn-ruler-toggle" class="active">On</button>
            <button id="btn-ruler-unit">mm</button> <button id="btn-ruler-eraser">Ruler Eraser</button>
            <button id="btn-ruler-reset" style="font-size: 11px; padding: 4px 8px;">Ruler Reset</button>
            <span id="ruler-status">미설정</span>
        </div>

        <div class="control-group">
            <button id="btn-remove">All Remove</button>
        </div>
    </div>

    <div id="canvas-container">
        <div class="canvas-wrapper">
            <canvas id="paint-canvas" width="900" height="600"></canvas>
            <canvas id="ruler-canvas" width="900" height="600"></canvas>
        </div>
    </div>

    <script>
        // 캔버스 및 콘텍스트 설정
        const paintCanvas = document.getElementById('paint-canvas');
        const pCtx = paintCanvas.getContext('2d');
        const rulerCanvas = document.getElementById('ruler-canvas');
        const rCtx = rulerCanvas.getContext('2d');

        // 엘리먼트 참조
        const btnPen = document.getElementById('btn-pen');
        const btnEraser = document.getElementById('btn-eraser');
        const sliderPen = document.getElementById('slider-pen');
        const sliderEraser = document.getElementById('slider-eraser');
        const colorPicker = document.getElementById('color-picker');
        const colorHex = document.getElementById('color-hex');
        const btnSave = document.getElementById('btn-save');
        const fileLoad = document.getElementById('file-load');
        const btnRemove = document.getElementById('btn-remove');

        // 룰러 엘리먼트 참조
        const btnRuler = document.getElementById('btn-ruler');
        const btnRulerToggle = document.getElementById('btn-ruler-toggle');
        const btnRulerUnit = document.getElementById('btn-ruler-unit');
        const btnRulerEraser = document.getElementById('btn-ruler-eraser');
        const btnRulerReset = document.getElementById('btn-ruler-reset');
        const rulerStatus = document.getElementById('ruler-status');

        // 앱 상태 관리
        let isDrawing = false;
        let currentMode = 'pen'; // 'pen', 'eraser', 'ruler', 'ruler-eraser'
        let penColor = '#000000';
        let penSize = 5;
        let eraserSize = 20;

        // 룰러 관련 상태 시스템
        let isRulerConfigured = false;
        let rulerSettingStep = 0; // 0: 시작전, 1: 기준점 찍음
        let rulerBasePoint = { x: 0, y: 0 };
        let pxPerMm = 0; // 1mm당 할당할 내부 픽셀 상수값

        let isRulerVisible = true;
        let currentRulerUnit = 'mm'; // 'mm' 또는 'inch'
        let rulerLines = []; // 저장될 자(ruler) 객체들의 배열 [{x1, y1, x2, y2, lengthText, unit}]
        let hoveredRulerIndex = null; // 현재 지우개 모드에서 마우스가 올라간 자의 인덱스

        // 실시간 그리기 임시 변수
        let rulerDrawStart = null;
        let currentMousePos = { x: 0, y: 0 };

        // 초기화 함수
        function init() {
            pCtx.fillStyle = '#ffffff';
            pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
            pCtx.lineCap = 'round';
            pCtx.lineJoin = 'round';
            rCtx.lineCap = 'round';
            rCtx.lineJoin = 'round';
            updateRulerStatusUI();
        }
        init();

        // 좌표 계산 유틸리티 (CSS 크기 변화에 대응하는 내부 픽셀 보정)
        function getCanvasCoordinates(e, canvasElement) {
            const rect = canvasElement.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvasElement.width / rect.width),
                y: (e.clientY - rect.top) * (canvasElement.height / rect.height)
            };
        }

        // 모드 전환 통합 관리 함수
        // 모드 전환 통합 관리 함수 (수정본)
        function changeMode(mode) {
            currentMode = mode;

            // 모든 버튼 활성화 클래스 제거
            btnPen.classList.remove('active');
            btnEraser.classList.remove('active');
            btnRuler.classList.remove('active');
            btnRulerEraser.classList.remove('active');

            // 타겟 버튼만 활성화 및 레이어 조절
            if (mode === 'pen') {
                btnPen.classList.add('active');
                rulerCanvas.style.pointerEvents = 'none'; // 펜 모드일 땐 마우스 통과
            }
            if (mode === 'eraser') {
                btnEraser.classList.add('active');
                rulerCanvas.style.pointerEvents = 'none'; // 지우개 모드일 땐 마우스 통과
            }
            if (mode === 'ruler') {
                btnRuler.classList.add('active');
                rulerCanvas.style.pointerEvents = 'auto'; // 룰러 그릴 땐 마우스 잡기

                isRulerVisible = true;
                btnRulerToggle.classList.add('active');
                btnRulerToggle.innerText = 'On';
            }
            if (mode === 'ruler-eraser') {
                btnRulerEraser.classList.add('active');
                rulerCanvas.style.pointerEvents = 'auto'; // 룰러 지울 땐 마우스 잡기

                isRulerVisible = true;
                btnRulerToggle.classList.add('active');
                btnRulerToggle.innerText = 'On';
            }

            // 룰러 도중에 모드 바꿨을 때 임시 상태 방지 세척
            if (mode !== 'ruler' && rulerSettingStep === 1) {
                rulerSettingStep = 0;
            }
            renderRulerLayer();
        }

        // 룰러 안내 텍스트 갱신
        function updateRulerStatusUI() {
            if (!isRulerConfigured) {
                rulerStatus.innerText = "미설정";
                rulerStatus.style.color = "#ff3b30";
            } else {
                rulerStatus.innerText = "설정 완료";
                rulerStatus.style.color = "#34c759";
            }
        }

        /* --- 일반 그림판 드로잉 (하단 레이어) --- */
        paintCanvas.addEventListener('mousedown', (e) => {
            if (currentMode !== 'pen' && currentMode !== 'eraser') return;
            isDrawing = true;
            const coords = getCanvasCoordinates(e, paintCanvas);
            pCtx.beginPath();
            pCtx.moveTo(coords.x, coords.y);
        });

        paintCanvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const coords = getCanvasCoordinates(e, paintCanvas);

            pCtx.lineWidth = currentMode === 'pen' ? penSize : eraserSize;
            pCtx.strokeStyle = currentMode === 'pen' ? penColor : '#ffffff';

            pCtx.lineTo(coords.x, coords.y);
            pCtx.stroke();
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        /* --- 룰러 로직 로직 & 상단 투명 레이어 인터랙션 --- */

        // 두 점 사이의 픽셀 거리 계산
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        }

        // 점과 선분 사이의 수직 거리를 구하는 수학 함수 (Eraser 호버용 유격 판정)
        function getDistanceToLine(pt, lineStart, lineEnd) {
            const dx = lineEnd.x - lineStart.x;
            const dy = lineEnd.y - lineStart.y;
            const l2 = dx * dx + dy * dy;
            if (l2 === 0) return getDistance(pt, lineStart);

            let t = ((pt.x - lineStart.x) * dx + (pt.y - lineStart.y) * dy) / l2;
            t = Math.max(0, Math.min(1, t)); // 선분 범위 내로 제한

            return getDistance(pt, { x: lineStart.x + t * dx, y: lineStart.y + t * dy });
        }

        // 상단 룰러 레이어 종합 렌더링 함수
        function renderRulerLayer() {
            rCtx.clearRect(0, 0, rulerCanvas.width, rulerCanvas.height);

            if (!isRulerVisible) return; // 꺼져있으면 렌더링 패스

            // 1. 기존에 이미 그어놓은 자(Ruler) 선들 그리기
            rulerLines.forEach((line, index) => {
                const isHovered = (currentMode === 'ruler-eraser' && index === hoveredRulerIndex);

                // 외곽선 효과 (Ruler Eraser 호버링 시)
                if (isHovered) {
                    rCtx.strokeStyle = 'rgba(255, 59, 48, 0.4)';
                    rCtx.lineWidth = 10;
                    rCtx.beginPath();
                    rCtx.moveTo(line.x1, line.y1);
                    rCtx.lineTo(line.x2, line.y2);
                    rCtx.stroke();
                }

                // 본래 자 선 스타일
                rCtx.strokeStyle = isHovered ? '#ff3b30' : '#4a4a4a';
                rCtx.lineWidth = 2;
                rCtx.setLineDash([]);
                rCtx.beginPath();
                rCtx.moveTo(line.x1, line.y1);
                rCtx.lineTo(line.x2, line.y2);
                rCtx.stroke();

                // 양끝 수직 눈금 단면 가이드
                drawTicks(line.x1, line.y1, line.x2, line.y2, isHovered ? '#ff3b30' : '#4a4a4a');

                // 거리 텍스트 라벨 출력
                rCtx.fillStyle = isHovered ? '#ff3b30' : '#000000';
                rCtx.font = 'bold 12px sans-serif';
                rCtx.textAlign = 'center';
                rCtx.textBaseline = 'bottom';

                const midX = (line.x1 + line.x2) / 2;
                const midY = (line.y1 + line.y2) / 2;
                rCtx.fillText(`${line.lengthText} ${line.unit}`, midX, midY - 6);
            });

            // 2. 룰러 세팅 단계(Calibration) 가이드라인 그리기
            if (currentMode === 'ruler' && !isRulerConfigured) {
                if (rulerSettingStep === 1) {
                    // 기준점 빨간 점
                    rCtx.fillStyle = '#ff3b30';
                    rCtx.beginPath();
                    rCtx.arc(rulerBasePoint.x, rulerBasePoint.y, 5, 0, Math.PI * 2);
                    rCtx.fill();

                    // 마우스를 따라다니는 임시 가이드 실선
                    rCtx.strokeStyle = 'rgba(255, 59, 48, 0.6)';
                    rCtx.lineWidth = 1;
                    rCtx.beginPath();
                    rCtx.moveTo(rulerBasePoint.x, rulerBasePoint.y);
                    rCtx.lineTo(currentMousePos.x, currentMousePos.y);
                    rCtx.stroke();
                }
            }

            // 3. 룰러 세팅 완료 상태에서 새로 자 그릴 때 고무줄(Rubber-banding) 가이드라인
            if (currentMode === 'ruler' && isRulerConfigured && rulerDrawStart) {
                rCtx.strokeStyle = '#007aff';
                rCtx.lineWidth = 2;
                rCtx.setLineDash([4, 4]); // 점선 유도
                rCtx.beginPath();
                rCtx.moveTo(rulerDrawStart.x, rulerDrawStart.y);
                rCtx.lineTo(currentMousePos.x, currentMousePos.y);
                rCtx.stroke();
                rCtx.setLineDash([]);

                // 실시간 변환 거리 미리보기 출력
                const pxDist = getDistance(rulerDrawStart, currentMousePos);
                let convertedDist = 0;
                if (currentRulerUnit === 'mm') {
                    convertedDist = (pxDist / pxPerMm).toFixed(1);
                } else {
                    convertedDist = ((pxDist / pxPerMm) / 25.4).toFixed(2); // mm -> inch 변환
                }

                rCtx.fillStyle = '#007aff';
                rCtx.font = '12px sans-serif';
                rCtx.fillText(`${convertedDist} ${currentRulerUnit}`, currentMousePos.x, currentMousePos.y - 10);
            }
        }

        // 자 모양 양끝 디테일 데코레이션 함수
        function drawTicks(x1, y1, x2, y2, color) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const tickLength = 6;

            rCtx.strokeStyle = color;
            rCtx.lineWidth = 2;

            // 시작점 수직선
            rCtx.beginPath();
            rCtx.moveTo(x1 - Math.sin(angle) * tickLength, y1 + Math.cos(angle) * tickLength);
            rCtx.lineTo(x1 + Math.sin(angle) * tickLength, y1 - Math.cos(angle) * tickLength);
            rCtx.stroke();

            // 끝점 수직선
            rCtx.beginPath();
            rCtx.moveTo(x2 - Math.sin(angle) * tickLength, y2 + Math.cos(angle) * tickLength);
            rCtx.lineTo(x2 + Math.sin(angle) * tickLength, y2 - Math.cos(angle) * tickLength);
            rCtx.stroke();
        }

        // 상단 룰러 캔버스 마우스 이동 이벤트
        rulerCanvas.addEventListener('mousemove', (e) => {
            const coords = getCanvasCoordinates(e, rulerCanvas);
            currentMousePos = coords;

            if (currentMode === 'ruler') {
                // 세팅 가이드 중이거나, 실제 자 긋는 중이면 화면 갱신
                if (rulerSettingStep === 1 || rulerDrawStart) {
                    renderRulerLayer();
                }
            }
            else if (currentMode === 'ruler-eraser') {
                // 지우개 모드 시 마우스와 가장 가까운 자 선분 추적
                let minDest = 999999;
                let targetIdx = null;
                const hoverTolerance = 8; // 8픽셀 유격 허용 범위

                rulerLines.forEach((line, idx) => {
                    const dist = getDistanceToLine(coords, { x: line.x1, y: line.y1 }, { x: line.x2, y: line.y2 });
                    if (dist < minDest) {
                        minDest = dist;
                        targetIdx = idx;
                    }
                });

                if (minDest <= hoverTolerance) {
                    if (hoveredRulerIndex !== targetIdx) {
                        hoveredRulerIndex = targetIdx;
                        renderRulerLayer();
                    }
                } else {
                    if (hoveredRulerIndex !== null) {
                        hoveredRulerIndex = null;
                        renderRulerLayer();
                    }
                }
            }
        });

        // 상단 룰러 캔버스 클릭(마우스 다운) 시 핵심 비즈니스 로직 처리
        rulerCanvas.addEventListener('mousedown', (e) => {
            const coords = getCanvasCoordinates(e, rulerCanvas);

            // [A] 룰러 모드일 때
            if (currentMode === 'ruler') {
                // STEP 1 : 아직 룰러 눈금 규격 세팅을 하지 않은 경우
                if (!isRulerConfigured) {
                    if (rulerSettingStep === 0) {
                        rulerBasePoint = coords;
                        rulerSettingStep = 1;
                        renderRulerLayer();
                    }
                    else if (rulerSettingStep === 1) {
                        const pixelDist = getDistance(rulerBasePoint, coords);
                        if (pixelDist === 0) return; // 제자리 클릭 방어

                        // 입력창 활성화 팝업
                        const unitChoice = prompt("단위를 선택하고 실제 수치를 입력하세요.\n단위 선택 입력 (mm / inch / cm) :", "mm");
                        if (!unitChoice) { rulerSettingStep = 0; renderRulerLayer(); return; }

                        const cleanUnit = unitChoice.trim().toLowerCase();
                        if (cleanUnit !== 'mm' && cleanUnit !== 'inch' && cleanUnit !== 'cm') {
                            alert("잘못된 단위입니다. mm, inch, cm 중 하나를 입력하세요.");
                            rulerSettingStep = 0;
                            renderRulerLayer();
                            return;
                        }

                        const rawValue = prompt(`선택한 [ ${cleanUnit} ] 기준, 그은 선의 실제 길이를 숫자로 입력하세요:`, "10");
                        const numValue = parseFloat(rawValue);
                        if (isNaN(numValue) || numValue <= 0) {
                            alert("올바른 숫자가 아닙니다. 처음부터 다시 시도하십시오.");
                            rulerSettingStep = 0;
                            renderRulerLayer();
                            return;
                        }

                        // 입력 받은 단위를 내부 시스템 기저 표준단위(mm)로 완벽 통합 연산
                        let mmLength = 0;
                        if (cleanUnit === 'mm') mmLength = numValue;
                        else if (cleanUnit === 'cm') mmLength = numValue * 10;
                        else if (cleanUnit === 'inch') mmLength = numValue * 25.4;

                        // 최종 변환 비율 상수 도출 (1mm당 몇 내부픽셀 인가)
                        pxPerMm = pixelDist / mmLength;
                        isRulerConfigured = true;
                        rulerSettingStep = 0;
                        updateRulerStatusUI();
                        alert("룰러 세팅 완료! 이제 자를 그릴 수 있습니다.");
                        renderRulerLayer();
                    }
                }
                // STEP 2 : 세팅이 완료되어 실제로 측정용 자를 그리는 타이밍
                else {
                    if (!rulerDrawStart) {
                        rulerDrawStart = coords;
                    } else {
                        const pxDist = getDistance(rulerDrawStart, coords);
                        if (pxDist > 2) { // 오클릭 유격 처리
                            let lengthText = "";
                            if (currentRulerUnit === 'mm') {
                                lengthText = (pxDist / pxPerMm).toFixed(1);
                            } else {
                                lengthText = ((pxDist / pxPerMm) / 25.4).toFixed(2);
                            }

                            // 신규 자 객체 구조 생성 보관
                            rulerLines.push({
                                x1: rulerDrawStart.x,
                                y1: rulerDrawStart.y,
                                x2: coords.x,
                                y2: coords.y,
                                lengthText: lengthText,
                                unit: currentRulerUnit
                            });
                        }
                        rulerDrawStart = null;
                        renderRulerLayer();
                    }
                }
            }
            // [B] 룰러 지우개 모드일 때 클릭 시 제거 판정
            else if (currentMode === 'ruler-eraser') {
                if (hoveredRulerIndex !== null) {
                    rulerLines.splice(hoveredRulerIndex, 1);
                    hoveredRulerIndex = null;
                    renderRulerLayer();
                }
            }
        });

        /* --- 툴바 버튼 이벤트 바인딩 --- */

        btnPen.addEventListener('click', () => changeMode('pen'));
        btnEraser.addEventListener('click', () => changeMode('eraser'));
        btnRuler.addEventListener('click', () => changeMode('ruler'));
        btnRulerEraser.addEventListener('click', () => changeMode('ruler-eraser'));

        // 룰러 보이기 토글 스위치 (On / Off)
        btnRulerToggle.addEventListener('click', () => {
            isRulerVisible = !isRulerVisible;
            if (isRulerVisible) {
                btnRulerToggle.classList.add('active');
                btnRulerToggle.innerText = 'On';
            } else {
                btnRulerToggle.classList.remove('active');
                btnRulerToggle.innerText = 'Off';
            }
            renderRulerLayer();
        });

        // 새로 그릴 자 단위 변환 토글 단추 (mm <-> inch)
        btnRulerUnit.addEventListener('click', () => {
            if (currentRulerUnit === 'mm') {
                currentRulerUnit = 'inch';
                btnRulerUnit.innerText = 'inch';
            } else {
                currentRulerUnit = 'mm';
                btnRulerUnit.innerText = 'mm';
            }
        });

        // 룰러 캘리브레이션 초기화 리셋 단추
        btnRulerReset.addEventListener('click', () => {
            isRulerConfigured = false;
            rulerSettingStep = 0;
            rulerDrawStart = null;
            pxPerMm = 0;
            updateRulerStatusUI();
            alert("룰러 기준 단위 세팅이 초기화되었습니다. Ruler 버튼을 눌러 다시 설정해 주세요.");
            renderRulerLayer();
        });

        // 기존 그림판 기능 연동 (슬라이더, 컬러, 세이브, 로드)
        sliderPen.addEventListener('input', (e) => penSize = e.target.value);
        sliderEraser.addEventListener('input', (e) => eraserSize = e.target.value);

        colorPicker.addEventListener('input', (e) => {
            penColor = e.target.value;
            colorHex.value = penColor.toUpperCase();
        });

        colorHex.addEventListener('input', (e) => {
            let code = e.target.value;
            if (!code.startsWith('#')) code = '#' + code;
            if (/^#[0-9A-F]{6}$/i.test(code)) {
                penColor = code;
                colorPicker.value = code;
            }
        });

        // 그림판 저장 (하단 도화지)
        btnSave.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'canvas-paint.png';
            link.href = paintCanvas.toDataURL('image/png');
            link.click();
        });

        // 그림판 로드 (하단 도화지에 꽉 차게 피팅)
        fileLoad.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    pCtx.fillStyle = '#ffffff';
                    pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
                    const hRatio = paintCanvas.width / img.width;
                    const vRatio = paintCanvas.height / img.height;
                    const ratio = Math.min(hRatio, vRatio);
                    const centerShift_x = (paintCanvas.width - img.width * ratio) / 2;
                    const centerShift_y = (paintCanvas.height - img.height * ratio) / 2;
                    pCtx.drawImage(img, 0, 0, img.width, img.height,
                        centerShift_x, centerShift_y, img.width * ratio, img.height * ratio);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        // 전체 초기화 (경고 창)
        btnRemove.addEventListener('click', () => {
            if (confirm('Are you sure?')) {
                // 그림 레이어 초기화
                pCtx.fillStyle = '#ffffff';
                pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
                // 룰러 레이어선 전부 파괴
                rulerLines = [];
                renderRulerLayer();
            }
        });
    </script>
</body>

</html>
