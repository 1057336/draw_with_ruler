<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Canvas Paint with Ruler Layer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 툴바 스타일 */
        #toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            background-color: #ffffff;
            padding: 12px 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            width: 100%;
            z-index: 10;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 1px solid #e0e0e0;
            padding-right: 12px;
        }

        .control-group:last-child {
            border-right: none;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4a4a4a;
        }

        button {
            background-color: #ececec;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        button.active {
            background-color: #007aff;
            color: white;
        }

        button#btn-remove {
            background-color: #ff3b30;
            color: white;
        }

        button#btn-remove:hover {
            background-color: #d62f26;
        }

        input[type="range"] {
            width: 70px;
            cursor: pointer;
        }

        input[type="color"] {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="text"] {
            width: 70px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            text-align: center;
        }

        .file-label {
            background-color: #34c759;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        #file-load {
            display: none;
        }

        /* 룰러 세팅 안내 모달/바 스타일 */
        #ruler-status {
            font-size: 12px;
            font-weight: bold;
            color: #ff3b30;
            margin-left: 5px;
        }

        /* 캔버스 영역 - 두 개의 캔버스를 겹치기 위해 relative 설정 */
        #canvas-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #e5e5e7;
            position: relative;
        }

        /* 두 캔버스를 완벽히 겹치게 만드는 포지셔닝 */
        .canvas-wrapper {
            position: relative;
            width: 900px;
            height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #paint-canvas {
            background-color: #ffffff;
            z-index: 1;
        }

        #ruler-canvas {
            background-color: transparent;
            z-index: 2; /* 룰러 레이어가 항상 위에 오도록 배치 */
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div class="control-group">
            <button id="btn-pen" class="active">Pen</button>
            <label for="slider-pen">Size</label>
            <input type="range" id="slider-pen" min="1" max="50" value="5">
        </div>

        <div class="control-group">
            <button id="btn-eraser">Eraser</button>
            <label for="slider-eraser">Size</label>
            <input type="range" id="slider-eraser" min="1" max="100" value="20">
        </div>

        <div class="control-group">
            <label>Color</label>
            <input type="color" id="color-picker" value="#000000">
            <input type="text" id="color-hex" value="#000000" maxlength="7">
        </div>

        <div class="control-group">
            <button id="btn-save" style="background-color: #007aff; color: white;">Save (PNG)</button>
            <label for="file-load" class="file-label">Load Image</label>
            <input type="file" id="file-load" accept="image/*">
        </div>

        <div class="control-group" style="background-color: #f2f2f7; padding: 6px 10px; border-radius: 8px;">
            <button id="btn-ruler">Ruler</button>
            <button id="btn-ruler-toggle" class="active">On</button>
            <button id="btn-ruler-unit">mm</button> <button id="btn-ruler-eraser">Ruler Eraser</button>
            <button id="btn-ruler-reset" style="font-size: 11px; padding: 4px 8px;">Ruler Reset</button>
            <span id="ruler-status">미설정</span>
        </div>

        <div class="control-group">
            <button id="btn-remove">All Remove</button>
        </div>
    </div>

    <div id="canvas-container">
        <div class="canvas-wrapper">
            <canvas id="paint-canvas" width="900" height="600"></canvas>
            <canvas id="ruler-canvas" width="900" height="600"></canvas>
        </div>
    </div>
